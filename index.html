<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title id="pageTitle">Доступ до посилання</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #fff;
      padding: 30px 20px;
      border-radius: 16px;
      max-width: 400px;
      width: 90%;
      text-align: center;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      animation: fadeIn 0.6s ease;
    }

    h1 {
      font-size: 22px;
      margin-bottom: 20px;
      line-height: 1.4;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 15px;
      margin: 20px 0;
      text-align: left;
      animation: slideUp 0.5s ease;
    }

    .icon {
      width: 40px;
      height: 40px;
      background: #ffe6ec;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      animation: pulse 1.5s infinite;
    }

    .text {
      font-size: 14px;
      color: #333;
    }

    #openBtnWrapper {
      margin-top: 20px;
      display: none;
    }

    button {
      padding: 14px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #ff4d6d;
      color: white;
      font-weight: bold;
      cursor: pointer;
      animation: pulse 1.5s infinite;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body>

<div class="container">
  <h1 id="title"></h1>

  <div class="step">
    <div class="icon">👆</div>
    <div class="text" id="step1"></div>
  </div>

  <div class="step">
    <div class="icon">🌐</div>
    <div class="text" id="step2"></div>
  </div>

  <div id="openBtnWrapper">
    <button id="btn" onclick="goToOffer()"></button>
  </div>
</div>

<script>
  const REDIRECT_URL = "https://google.com";

  const translations = {
    uk: {
      title: "Щоб отримати доступ до посилання,<br>виконайте наступні<br>2 прості кроки:",
      step1: 'Натисніть на меню "..."<br>у правому верхньому куті',
      step2: 'Оберіть "Відкрити в браузері"',
      btn: "Я відкрив у браузері",
      pageTitle: "Доступ до посилання"
    },
    en: {
      title: "To access the link,<br>follow these<br>2 simple steps:",
      step1: 'Tap the "..." menu<br>in the top right corner',
      step2: 'Select "Open in browser"',
      btn: "I opened it in browser",
      pageTitle: "Access to the link"
    },
    de: {
      title: "Um auf den Link zuzugreifen,<br>folgen Sie diesen<br>2 einfachen Schritten:",
      step1: 'Tippen Sie auf das "..." Menü<br>oben rechts',
      step2: 'Wählen Sie "Im Browser öffnen"',
      btn: "Ich habe es im Browser geöffnet",
      pageTitle: "Zugriff auf den Link"
    }
  };

  function detectLanguage() {
    const lang = navigator.language || navigator.userLanguage;

    if (lang.startsWith("de")) return "de";
    if (lang.startsWith("en")) return "en";
    return "uk"; // дефолт
  }

  function applyTranslations() {
    const lang = detectLanguage();
    const t = translations[lang];

    document.getElementById("title").innerHTML = t.title;
    document.getElementById("step1").innerHTML = t.step1;
    document.getElementById("step2").innerHTML = t.step2;
    document.getElementById("btn").innerText = t.btn;
    document.getElementById("pageTitle").innerText = t.pageTitle;
  }

  function goToOffer() {
    window.location.href = REDIRECT_URL;
  }

  function isInAppBrowser() {
    const ua = navigator.userAgent || "";
    return /TikTok|BytedanceWebview|Instagram|FBAN|FBAV|WebView|wv/i.test(ua);
  }

  applyTranslations();

  if (!isInAppBrowser()) {
    setTimeout(() => {
      document.getElementById("openBtnWrapper").style.display = "block";
    }, 1200);
  }
</script>

</body>
</html>
